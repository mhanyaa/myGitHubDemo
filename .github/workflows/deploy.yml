name: Deploy Bicep

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: az bicep build --file main.bicep --outdir compiled

      - name: What-If (Plan)
        run: az deployment sub what-if --location westeurope --template-file main.bicep --parameters params/dev.bicepparam

      - name: Deploy
        run: az deployment sub create --location westeurope --template-file main.bicep --parameters params/dev.bicepparam
