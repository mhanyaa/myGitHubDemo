name:  Deploy Bicep
on:
  push:
    branches: [ main ]
  
  permissions:
    contents: read
    id-token: write

    jobs:
      deploy:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Azure Login (OIDC)
            uses: azure/login@v1
            with:
              client-id: ${{ secrets.AZURE_CLIENT_ID }}
              tenant-id: ${{ secrets.AZURE_TENANT_ID }}
              subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

              - name: validate bicep
                run: |
                  az bicep build --file infra/main.bicep --outdir ./compiled

                  name: What-If (plan)
                  run: |
                    az deployment sub what-if --location westeurope --template-file infra/main.bicep \ --parameters @infra/params/dev.bicepparam

              - name: Deploy
                run: |
                  az deployment sub create --location westeurope --template-file infra/main.bicep \ --parameters @infra/params/dev.bicepparam      
